<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameEdu Universe v8.5 - Full Restoration</title>
    <style id="ctage-theme">
        :root {
            --primary-bg: #46178f;    /* Roxo Escuro */
            --header-bg: #25076b;      /* Roxo Deep */
            --accent: #ffa600;        /* Laranja Copa */
            --correct: #26890c;       /* Verde Sucesso */
            --white: #ffffff;
            --light-bg: #f0f2f5;
        }
    </style>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--primary-bg); color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.5s; }
        
        /* HEADER PROFISSIONAL */
        header { background: var(--header-bg); padding: 10px 20px; display: none; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; height: 65px; box-sizing: border-box; color: white; }
        .logo { color: white; font-weight: bold; font-size: 24px; cursor: pointer; text-decoration: none; }
        .search-area { flex-grow: 1; margin: 0 40px; max-width: 500px; }
        .search-area input { width: 100%; padding: 10px 20px; border-radius: 25px; border: none; background: rgba(255,255,255,0.2); color: white; outline: none; }
        .search-area input:focus { background: white; color: #333; }

        .user-stats { display: flex; gap: 15px; align-items: center; font-weight: bold; }
        .coin-display { color: var(--accent); background: rgba(255,255,255,0.1); padding: 6px 15px; border-radius: 20px; }

        /* LAYOUT E SIDEBAR */
        .main-container { display: none; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .content { flex: 1; overflow-y: auto; padding: 30px; background: var(--light-bg); position: relative; }
        
        .screen { display: none; width: 100%; flex-direction: column; }
        .active { display: flex; }

        /* ENGINE DE CRIAÇÃO (PRO FIX) */
        .engine-slide { background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary-bg); margin-bottom: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .opt-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        .correct-btn { width: 45px; height: 42px; background: #eee; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .is-correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }

        /* PLAYER ORGANIZADO */
        .watch-layout { display: grid; grid-template-columns: 1fr 320px; gap: 20px; }
        .player-frame { background: #000; border-radius: 20px; aspect-ratio: 16/9; position: relative; overflow: hidden; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; }
        .game-view { width: 100%; height: 100%; background: white; display: none; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; }
        
        /* TELA DE LOGIN (ESTILO IMAGEM 1) */
        #screen-auth { position: fixed; inset: 0; background: var(--primary-bg); display: flex; align-items: center; justify-content: center; z-index: 5000; }
        .auth-box { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; width: 380px; }
        
        /* INPUTS E BOTÕES */
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn-p { background: var(--primary-bg); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        
        .quiz-card { background: white; padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border-bottom: 4px solid #ddd; transition: 0.3s; }
        .quiz-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        #chat-box { flex: 1; background: #f8f9fa; border-radius: 12px; padding: 10px; overflow-y: auto; font-size: 14px; border: 1px solid #eee; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active">
        <div class="auth-box">
            <h1 style="color: var(--primary-bg); margin-bottom: 5px;">GameEdu</h1>
            <p style="color: #666; margin-bottom: 25px;">Acesse sua conta</p>
            <input type="email" id="auth-email" placeholder="E-mail">
            <input type="password" id="auth-password" placeholder="Senha">
            <button class="btn-p" onclick="handleAuth()">ENTRAR</button>
        </div>
    </div>

    <header id="main-header">
        <div class="logo" onclick="showScreen('screen-home')">GameEdu Universe</div>
        <div class="search-area">
            <input type="text" placeholder="Pesquisar quizzes..." onkeyup="searchQuizzes()">
        </div>
        <div class="user-stats">
            <button onclick="showScreen('screen-avatar')" style="background:none; border:none; font-size:20px; cursor:pointer;">👕</button>
            <div class="coin-display">⚽ <span id="user-coins">0</span></div>
            <div id="display-username">...</div>
            <button onclick="logout()" style="background:rgba(255,255,255,0.1); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer;">Sair</button>
        </div>
    </header>

    <div class="main-container" id="app-content">
        <div class="sidebar">
            <h3>💬 Chat Global</h3>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Diga oi..." onkeypress="if(event.key=='Enter') sendChat()">
            <h3 style="margin-top:20px">🏆 Ranking</h3>
            <div id="ranking-list" style="font-size: 13px;"></div>
        </div>

        <div class="content">
            
            <div id="screen-home" class="screen active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h1 style="margin:0; color: var(--primary-bg); border-bottom: 4px solid var(--primary-bg);">Home</h1>
                    <button class="btn-p" style="width:auto; padding: 10px 25px;" onclick="openEngine()">+ Criar Quiz (+50 ⚽)</button>
                </div>
                <div id="quiz-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;"></div>
            </div>

            <div id="screen-watch" class="screen">
                <div class="watch-layout">
                    <div>
                        <div class="player-frame">
                            <div id="watch-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; z-index:10;">
                                <h1 id="watch-title-overlay">...</h1>
                                <button onclick="startPlaySession()" style="background:var(--correct); color:white; padding:15px 40px; border-radius:50px; border:none; font-size:20px; cursor:pointer; font-weight:bold;">JOGAR</button>
                            </div>
                            <div id="game-view" class="game-view">
                                <h2 id="g-question-text"></h2>
                                <div id="g-options" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; width:100%;"></div>
                            </div>
                        </div>
                        <div style="background:white; padding:20px; margin-top:15px; border-radius:15px;">
                            <h2 id="w-title-sub" style="margin:0">...</h2>
                            <p style="color:#666">Finalize este desafio para ganhar moedas!</p>
                        </div>
                    </div>
                    <div id="watch-suggestions"></div>
                </div>
            </div>

            <div id="screen-engine" class="screen">
                <div style="background:white; padding:30px; border-radius:20px; max-width:800px; margin:auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
                    <h2 style="color:var(--primary-bg)">🚀 Central de Criação</h2>
                    <input type="text" id="eng-title-input" placeholder="Título do seu Quiz">
                    <div id="eng-slides-list"></div>
                    <button onclick="addNewSlide()" style="background:#eee; width:100%; margin-top:10px; border:none; padding:12px; border-radius:10px; cursor:pointer;">+ Adicionar Pergunta</button>
                    <button class="btn-p" style="margin-top:20px; background:var(--correct);" onclick="publishQuizToCloud()">Publicar Quiz no Universo</button>
                </div>
            </div>

            <div id="screen-avatar" class="screen">
                <div style="background:white; padding:30px; border-radius:20px; max-width:500px; margin:auto;">
                    <h2>👕 Loja do Torcedor</h2>
                    <div id="avatar-display" style="font-size: 50px; text-align:center; margin-bottom:20px">👤</div>
                    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px;">
                        <button onclick="buyAvatar('👔', 100)" class="btn-p" style="background:#eee; color:#333">👔 100</button>
                        <button onclick="buyAvatar('👕', 100)" class="btn-p" style="background:#eee; color:#333">👕 100</button>
                        <button onclick="buyAvatar('🎓', 200)" class="btn-p" style="background:#eee; color:#333">🎓 200</button>
                    </div>
                    <button class="btn-p" style="margin-top:20px" onclick="showScreen('screen-home')">Voltar</button>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, increment, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtYYWq2gBk13I2AMoMvNwaiOfKab1gziM",
            authDomain: "gameedu-315ac.firebaseapp.com",
            projectId: "gameedu-315ac",
            databaseURL: "https://gameedu-315ac-default-rtdb.firebaseio.com",
            storageBucket: "gameedu-315ac.firebasestorage.app",
            messagingSenderId: "462893204799",
            appId: "1:462893204799:web:720bb0ae89a0905f3f3f8a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null; let userData = null; let library = {}; let activeQuiz = null;

        // --- AUTH ---
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-password').value;
            if(!e || p.length < 6) return alert("Dados inválidos!");
            signInWithEmailAndPassword(auth, e, p).catch(() => {
                createUserWithEmailAndPassword(auth, e, p).then(r => set(ref(db, 'users/'+r.user.uid), {
                    username: e.split('@')[0], coins: 100, avatar: '👤'
                }));
            });
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; startApp(); }
            else { document.getElementById('screen-auth').style.display='flex'; }
        });

        window.logout = () => signOut(auth);

        function startApp() {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('app-content').style.display = 'flex';

            onValue(ref(db, 'users/' + user.uid), s => {
                userData = s.val();
                if(userData) {
                    document.getElementById('user-coins').innerText = userData.coins;
                    document.getElementById('display-username').innerText = userData.username;
                    document.getElementById('avatar-display').innerText = userData.avatar || '👤';
                }
            });

            onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(5)), s => {
                const list = document.getElementById('ranking-list'); list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((u, i) => list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>${i+1}º ${u.username}</span><span>⚽ ${u.coins}</span></div>`);
            });

            onValue(ref(db, 'library'), s => { library = s.val() || {}; renderFeed(); });
            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                if(s.val()) Object.values(s.val()).slice(-10).forEach(m => box.innerHTML += `<div><b>${m.user}:</b> ${m.text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, 'chat'), { user: userData.username, text: i.value });
            i.value = "";
        };

        function renderFeed() {
            const grid = document.getElementById('quiz-list'); grid.innerHTML = "";
            Object.keys(library).forEach(id => {
                const card = document.createElement('div'); card.className = "quiz-card";
                card.innerHTML = `<div style="font-size:40px;">⚽</div><b>${library[id].title}</b>`;
                card.onclick = () => goToWatch(id); grid.appendChild(card);
            });
        }

        // --- ENGINE PROFISSIONAL (FIXED) ---
        window.openEngine = () => { document.getElementById('eng-slides-list').innerHTML = ""; showScreen('screen-engine'); addNewSlide(); };
        
        window.addNewSlide = () => {
            const idx = document.querySelectorAll('.engine-slide').length;
            const div = document.createElement('div');
            div.className = 'engine-slide';
            div.dataset.correct = "0";
            div.innerHTML = `
                <b>Pergunta ${idx+1}</b>
                <input type="text" class="q-val" placeholder="Enunciado...">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    ${[0,1,2,3].map(o => `
                        <div class="opt-row">
                            <input type="text" class="o-val" placeholder="Opção ${o+1}">
                            <button class="correct-btn ${o==0?'is-correct':''}" onclick="window.setCorrect(this, ${o})">✓</button>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('eng-slides-list').appendChild(div);
        };

        window.setCorrect = (btn, val) => {
            const p = btn.closest('.engine-slide');
            p.dataset.correct = val;
            p.querySelectorAll('.correct-btn').forEach(b => b.classList.remove('is-correct'));
            btn.classList.add('is-correct');
        };

        window.publishQuizToCloud = async () => {
            const title = document.getElementById('eng-title-input').value;
            const slidesNodes = document.querySelectorAll('.engine-slide');
            const questions = [];

            slidesNodes.forEach(node => {
                const q = node.querySelector('.q-val').value;
                const opts = Array.from(node.querySelectorAll('.o-val')).map(i => i.value);
                if(q && opts.every(o => o !== "")) questions.push({ q, options: opts, correct: node.dataset.correct });
            });

            if(!title || questions.length === 0) return alert("Preencha tudo!");
            await push(ref(db, 'library'), { title, questions });
            update(ref(db, 'users/'+user.uid), { coins: increment(50) });
            showScreen('screen-home');
        };

        // --- PLAY ---
        window.goToWatch = (id) => {
            activeQuiz = library[id]; showScreen('screen-watch');
            document.getElementById('watch-title-overlay').innerText = activeQuiz.title;
            document.getElementById('w-title-sub').innerText = activeQuiz.title;
            document.getElementById('watch-overlay').style.display='flex'; document.getElementById('game-view').style.display='none';
        };

        window.startPlaySession = () => {
            document.getElementById('watch-overlay').style.display='none'; document.getElementById('game-view').style.display='flex';
            let step = 0;
            const render = () => {
                const q = activeQuiz.questions[step];
                if(!q) { alert("Fim!"); update(ref(db, 'users/'+user.uid), {coins: increment(50)}); showScreen('screen-home'); return; }
                document.getElementById('g-question-text').innerText = q.q;
                const grid = document.getElementById('g-options'); grid.innerHTML = "";
                q.options.forEach((opt, i) => {
                    const b = document.createElement('button'); b.className="btn-p"; b.style.background="#e21b3c"; b.innerText=opt;
                    b.onclick = () => {step++; render();}; grid.appendChild(b);
                });
            };
            render();
        };

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.buyAvatar = (e, c) => {
            if(userData.coins >= c) {
                update(ref(db, 'users/'+user.uid), { avatar: e, coins: increment(-c)});
                alert("Visual atualizado!");
            } else alert("Sem moedas!");
        };
    </script>
</body>
</html>
