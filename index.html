<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameEdu Universe - Full Design Fix</title>
    <style id="ctage-theme">
        :root {
            --primary: #008751; 
            --secondary: #005a36;
            --correct: #26890c;
            --accent: #ffcc00; 
            --bg: #004d30;
            --white: #ffffff;
        }
        body {
            background-image: radial-gradient(circle at center, #008751 0%, #004d30 100%);
            background-attachment: fixed;
        }
    </style>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ESTILO GLOBAL DE INPUTS (DESIGN FIX) */
        input[type="text"], input[type="email"], input[type="password"], input[type="date"], textarea {
            width: 100%;
            padding: 12px 15px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 15px;
            transition: 0.3s;
            outline: none;
            background-color: #fff;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(0, 135, 81, 0.3);
        }

        /* HEADER */
        header { background: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; height: 65px; box-sizing: border-box; }
        .logo { color: var(--primary); font-weight: bold; font-size: 22px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        #mobile-menu-btn { display: none; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 8px; font-size: 20px; cursor: pointer; }

        .search-area { flex-grow: 1; margin: 0 20px; max-width: 500px; }
        .user-stats { display: flex; gap: 10px; align-items: center; font-weight: bold; }
        .coin-display { color: #fff; background: linear-gradient(45deg, #ffd700, #ffa600); padding: 5px 15px; border-radius: 20px; box-shadow: 0 3px 0px #c58600; }

        /* LAYOUT */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: rgba(255,255,255,0.98); backdrop-filter: blur(10px); border-right: 3px solid var(--accent); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; transition: 0.3s; z-index: 2000; }
        .content { flex: 1; overflow-y: auto; padding: 20px; box-sizing: border-box; position: relative; }
        
        .screen { display: none; width: 100%; }
        .active { display: flex; flex-direction: column; }

        /* PLAYER ORGANIZADO */
        .watch-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .player-frame { background: #111; border-radius: 20px; aspect-ratio: 16/9; position: relative; overflow: hidden; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; }
        .game-view-container { width: 100%; height: 100%; background: white; display: none; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; }
        .g-options-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 10px; width: 100%; flex-grow: 1; margin-top: 15px; }
        .btn-game-opt { border: none; border-radius: 12px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0px rgba(0,0,0,0.2); }

        /* ENGINE CARDS */
        .engine-slide { background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .opt-input-wrapper { display: flex; gap: 8px; align-items: center; width: 100%; }
        .correct-btn { width: 50px; height: 45px; background: #eee; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; flex-shrink: 0; font-size: 18px; }
        .is-correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }

        /* UI ELEMENTS */
        .btn-p { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; }
        #chat-box { flex: 1; min-height: 200px; background: #f8f9fa; border-radius: 12px; padding: 10px; overflow-y: auto; font-size: 13px; border: 1px solid #ddd; margin-bottom: 10px; }
        .quiz-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .quiz-card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; border-bottom: 5px solid #ddd; text-align: center; }

        /* @MEDIA - MOBILE */
        @media (max-width: 900px) {
            #mobile-menu-btn { display: block; }
            .sidebar { position: fixed; left: -320px; top: 65px; bottom: 0; }
            .sidebar.open { left: 0; }
            .watch-layout { grid-template-columns: 1fr; }
            .search-area { display: none; }
            .player-frame { aspect-ratio: 4 / 3; }
        }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active" style="margin-top: 50px;">
        <div style="background: white; padding: 30px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 90%; max-width: 400px; margin: 0 auto; text-align: center; border: 4px solid var(--primary);">
            <h1 style="color: var(--primary);">GameEdu</h1>
            <p style="font-weight: bold; color: #666;">🏆 CTAGE COPA 2026</p>
            <input type="email" id="auth-email" placeholder="Seu melhor e-mail">
            <input type="password" id="auth-password" placeholder="Sua senha secreta">
            <button class="btn-p" onclick="handleAuth()">ENTRAR NO ESTÁDIO</button>
            <div id="auth-error" style="color: #e21b3c; margin-top: 15px; font-size: 14px;"></div>
        </div>
    </div>

    <header id="main-header" style="display:none">
        <div style="display:flex; align-items:center;">
            <button id="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <a href="#" class="logo" onclick="location.reload()">⚽ <span>GameEdu</span></a>
        </div>
        <div class="search-area">
            <input type="text" id="search-input" placeholder="O que você quer aprender hoje?" onkeyup="searchQuizzes()">
        </div>
        <div class="user-stats">
            <span class="coin-display">⚽ <span id="user-coins">0</span></span>
            <button onclick="logout()" style="background:#f0f0f0; border:none; padding: 8px 12px; border-radius: 8px; cursor:pointer; font-weight:bold;">Sair</button>
        </div>
    </header>

    <div class="main-container" id="app-content" style="display:none">
        <div class="sidebar" id="sidebar">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3>💬 Chat da Galera</h3>
                <button onclick="toggleSidebar()" style="background:none; border:none; font-size:20px; cursor:pointer;" class="mobile-only">✕</button>
            </div>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Manda um alô..." onkeypress="if(event.key=='Enter') sendChat()">
            
            <h3 style="margin-top: 20px;">🏆 Ranking 2026</h3>
            <div id="ranking-list"></div>
        </div>

        <div class="content">
            <div id="screen-home" class="screen active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="color: white; text-shadow: 2px 2px 4px #000;">Quizzes</h2>
                    <button class="btn-p" style="width:auto; padding:10px 20px;" onclick="openEngine()">+ Criar Novo</button>
                </div>
                <div id="quiz-grid-home" class="quiz-grid"></div>
            </div>

            <div id="screen-watch" class="screen">
                <div class="watch-layout">
                    <div class="watch-main">
                        <div class="player-frame">
                            <div id="watch-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; z-index:10; text-align:center; padding:20px;">
                                <h1 id="watch-title-overlay" style="font-size: 24px;">Título</h1>
                                <button onclick="startPlaySession()" style="background:var(--correct); color:white; padding:15px 30px; border-radius:50px; border:none; font-size:18px; cursor:pointer; font-weight:bold;">JOGAR AGORA</button>
                            </div>
                            <div id="game-view" class="game-view-container">
                                <h2 id="g-question-text" style="font-size: 20px; text-align:center; color: var(--secondary);">Pergunta?</h2>
                                <div id="g-options-grid" class="g-options-grid"></div>
                            </div>
                        </div>
                        <div style="background:white; padding:15px; margin-top:10px; border-radius:15px;">
                            <h2 id="watch-title-main" style="margin:0; font-size: 18px;">Título</h2>
                            <p style="color:#666; font-size:12px;">Temporada Copa 2026 • Ganhe 50 ⚽</p>
                        </div>
                    </div>
                    <div class="watch-side" id="watch-suggestions-list"></div>
                </div>
            </div>

            <div id="screen-engine" class="screen">
                <div style="background:white; padding:25px; border-radius:20px; max-width:750px; margin:auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
                    <h2 style="color: var(--primary);">🚀 Central de Criação</h2>
                    <input type="text" id="eng-title" placeholder="Qual o título do seu Quiz?">
                    <div id="eng-slides-list"></div>
                    <button onclick="addNewSlide()" style="background:#eee; width:100%; margin-top:10px; border:1px solid #ddd; padding:12px; border-radius:10px; cursor:pointer;">+ Adicionar Nova Pergunta</button>
                    <button class="btn-p" style="margin-top:20px; background:var(--correct);" onclick="publishQuizToCloud()">Publicar Quiz no Universo</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, increment, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtYYWq2gBk13I2AMoMvNwaiOfKab1gziM",
            authDomain: "gameedu-315ac.firebaseapp.com",
            projectId: "gameedu-315ac",
            databaseURL: "https://gameedu-315ac-default-rtdb.firebaseio.com",
            storageBucket: "gameedu-315ac.firebasestorage.app",
            messagingSenderId: "462893204799",
            appId: "1:462893204799:web:720bb0ae89a0905f3f3f8a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        let library = {};
        let activeQuiz = null;

        window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); };

        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value.trim();
            const p = document.getElementById('auth-password').value;
            if(!e || p.length < 6) return alert("E-mail válido e senha (mín. 6)!");
            signInWithEmailAndPassword(auth, e, p).catch(() => {
                createUserWithEmailAndPassword(auth, e, p).then(r => set(ref(db, 'users/'+r.user.uid), {username: e.split('@')[0], coins: 100}));
            });
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; startUniverse(); }
            else { document.getElementById('screen-auth').style.display = 'flex'; }
        });

        window.logout = () => signOut(auth);

        function startUniverse() {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('app-content').style.display = 'flex';

            onValue(ref(db, 'users/' + user.uid), s => {
                if(s.val()) {
                    document.getElementById('user-coins').innerText = s.val().coins;
                    document.getElementById('display-username').innerText = s.val().username;
                }
            });

            onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(10)), s => {
                const list = document.getElementById('ranking-list'); list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((u, i) => {
                    list.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; border-bottom:1px solid #eee; font-size:12px;"><span><b>${i+1}º</b> ${u.username}</span><span>⚽ ${u.coins}</span></div>`;
                });
            });

            onValue(ref(db, 'library'), s => { library = s.val() || {}; renderHomeFeed(); });

            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                if(s.val()) Object.values(s.val()).slice(-15).forEach(m => box.innerHTML += `<div><b>${m.user}:</b> ${m.text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, 'chat'), { user: document.getElementById('display-username').innerText, text: i.value });
            i.value = "";
        };

        function renderHomeFeed() {
            const grid = document.getElementById('quiz-grid-home'); grid.innerHTML = "";
            Object.keys(library).forEach(id => {
                const card = document.createElement('div'); card.className = "quiz-card";
                card.innerHTML = `<div style="height:80px; background:var(--primary); display:flex; align-items:center; justify-content:center; color:white; font-size:30px;">⚽</div><div style="padding:10px;"><b>${library[id].title}</b></div>`;
                card.onclick = () => goToWatchPage(id); grid.appendChild(card);
            });
        }

        window.goToWatchPage = (id) => {
            activeQuiz = library[id];
            showScreen('screen-watch');
            document.getElementById('watch-title-main').innerText = activeQuiz.title;
            document.getElementById('watch-title-overlay').innerText = activeQuiz.title;
            document.getElementById('watch-overlay').style.display = 'flex';
            document.getElementById('game-view').style.display = 'none';
            if(window.innerWidth < 900) document.getElementById('sidebar').classList.remove('open');
        };

        window.startPlaySession = () => {
            document.getElementById('watch-overlay').style.display = 'none';
            document.getElementById('game-view').style.display = 'flex';
            let step = 0;
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
            const render = () => {
                const q = activeQuiz.questions[step];
                if(!q) { alert("GOL! +50 Moedas!"); update(ref(db, 'users/'+user.uid), { coins: increment(50) }); showScreen('screen-home'); return; }
                document.getElementById('g-question-text').innerText = q.q;
                const grid = document.getElementById('g-options-grid'); grid.innerHTML = "";
                q.options.forEach((opt, i) => {
                    const b = document.createElement('button'); b.className = 'btn-game-opt';
                    b.style.background = colors[i]; b.innerText = opt;
                    b.onclick = () => { step++; render(); }; grid.appendChild(b);
                });
            };
            render();
        };

        window.openEngine = () => { document.getElementById('eng-slides-list').innerHTML = ""; showScreen('screen-engine'); };
        window.addNewSlide = () => {
            const idx = document.querySelectorAll('.engine-slide').length;
            const div = document.createElement('div'); div.className = 'engine-slide'; div.dataset.correct = "0";
            div.innerHTML = `<b>Pergunta ${idx+1}</b><input type="text" class="q-in" placeholder="Escreva aqui sua pergunta...">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    ${[0,1,2,3].map(o => `<div class="opt-input-wrapper"><input type="text" class="o-in" placeholder="Opção ${o+1}"><button class="correct-btn ${o==0?'is-correct':''}" onclick="window.markC(this, ${o})">✓</button></div>`).join('')}
                </div>`;
            document.getElementById('eng-slides-list').appendChild(div);
        };
        window.markC = (btn, val) => {
            const p = btn.closest('.engine-slide'); p.dataset.correct = val;
            p.querySelectorAll('.correct-btn').forEach(b => b.classList.remove('is-correct')); btn.classList.add('is-correct');
        };
        window.publishQuizToCloud = async () => {
            const title = document.getElementById('eng-title').value;
            const questions = Array.from(document.querySelectorAll('.engine-slide')).map(s => ({
                q: s.querySelector('.q-in').value,
                options: Array.from(s.querySelectorAll('.o-in')).map(i => i.value),
                correct: s.dataset.correct
            }));
            await push(ref(db, 'library'), { title, questions });
            update(ref(db, 'users/'+user.uid), { coins: increment(50) });
            showScreen('screen-home');
        };

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
        window.searchQuizzes = () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('#quiz-grid-home > div').forEach(card => card.style.display = card.innerText.toLowerCase().includes(term) ? "block" : "none");
        };
    </script>
</body>
</html>
