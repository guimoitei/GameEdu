<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameEdu Universe - CTAGE COPA 2026</title>
    <style id="ctage-theme">
        :root {
            --primary: #008751; 
            --secondary: #005a36;
            --correct: #26890c;
            --accent: #ffcc00; 
            --bg: #004d30;
            --white: #ffffff;
        }
        body {
            background-image: radial-gradient(circle at center, #008751 0%, #004d30 100%);
            background-attachment: fixed;
        }
    </style>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.5s; }
        
        /* BARRA SUPERIOR */
        header { background: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; height: 65px; box-sizing: border-box; }
        .logo { color: var(--primary); font-weight: bold; font-size: 26px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .search-area { flex-grow: 1; margin: 0 40px; max-width: 600px; }
        .search-area input { width: 100%; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--primary); background: #f0f2f5; outline: none; font-size: 15px; }

        .user-stats { display: flex; gap: 15px; align-items: center; font-weight: bold; }
        .coin-display { color: #fff; background: linear-gradient(45deg, #ffd700, #ffa600); padding: 6px 15px; border-radius: 20px; box-shadow: 0 4px 0px #c58600; display: flex; align-items: center; gap: 5px; }

        /* LAYOUT PRINCIPAL */
        .main-container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-right: 3px solid var(--accent); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .content { flex: 1; overflow-y: auto; padding: 25px; box-sizing: border-box; position: relative; }
        
        .screen { display: none; width: 100%; }
        .active { display: flex; flex-direction: column; }

        /* ENGINE DE CRIAÇÃO */
        .engine-container { max-width: 800px; margin: 0 auto; width: 100%; }
        .engine-slide { background: white; padding: 25px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .opt-grid-engine { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .opt-input-wrapper { display: flex; gap: 8px; align-items: center; background: #f9f9f9; padding: 8px; border-radius: 10px; border: 1px solid #eee; }
        .correct-btn { width: 45px; height: 40px; background: #ddd; border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; transition: 0.3s; }
        .is-correct { background: var(--correct) !important; box-shadow: 0 0 10px rgba(38, 137, 12, 0.4); }

        /* TELA DE EXECUÇÃO (PLAYER ORGANIZADO) */
        .watch-layout { display: grid; grid-template-columns: 1fr 380px; gap: 25px; max-width: 1500px; margin: 0 auto; width: 100%; }
        .player-frame { background: #111; border-radius: 20px; aspect-ratio: 16/9; position: relative; overflow: hidden; border: 5px solid var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; }
        
        .game-view-container { width: 100%; height: 100%; background: white; display: none; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; }
        #g-question-text { color: #222; font-size: 28px; text-align: center; margin-bottom: 20px; font-weight: bold; flex-shrink: 0; }
        .g-options-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; width: 100%; flex-grow: 1; }
        .btn-game-opt { border: none; border-radius: 15px; color: white; font-size: 22px; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0px rgba(0,0,0,0.2); }
        .btn-game-opt:active { transform: translateY(4px); box-shadow: none; }

        .watch-info { background: white; padding: 25px; border-radius: 15px; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .suggestion-card { display: flex; gap: 12px; background: white; padding: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #eee; margin-bottom: 12px; transition: 0.2s; }
        .suggestion-card:hover { transform: scale(1.02); background: #f8f9fa; }
        .s-thumb { width: 120px; height: 68px; background: var(--primary); border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 20px; }

        /* COMPONENTES GERAIS */
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        button { padding: 14px 25px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-p { background: var(--primary); color: white; width: 100%; }
        
        #chat-box { flex: 1; min-height: 200px; background: #f8f9fa; border-radius: 12px; padding: 15px; overflow-y: auto; font-size: 14px; border: 1px solid #ddd; margin-bottom: 15px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; align-items: center; background: white; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active" style="margin-top: 60px;">
        <div style="background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.3); width: 420px; margin: 0 auto; text-align: center; border: 4px solid var(--primary);">
            <h1 style="color: var(--primary); font-size: 36px; margin-bottom: 5px;">GameEdu</h1>
            <p style="color: #666; margin-bottom: 25px; font-weight: bold;">🏆 CTAGE COPA 2026</p>
            <input type="email" id="auth-email" placeholder="E-mail Acadêmico">
            <input type="password" id="auth-password" placeholder="Senha de Acesso">
            <button class="btn-p" onclick="handleAuth()">ENTRAR NO CAMPO</button>
            <div id="auth-error" style="color: #e21b3c; margin-top: 15px; font-size: 14px;"></div>
        </div>
    </div>

    <header id="main-header" style="display:none">
        <a href="#" class="logo" onclick="location.reload()">GameEdu ⚽</a>
        <div class="search-area">
            <input type="text" id="search-input" placeholder="Pesquisar partidas e quizzes..." onkeyup="searchQuizzes()">
        </div>
        <div class="user-stats">
            <span class="coin-display">⚽ <span id="user-coins">0</span></span>
            <span id="display-username" style="color: var(--primary)">...</span>
            <button onclick="logout()" style="background:#f0f0f0; padding: 8px 15px; border-radius: 8px;">Sair</button>
        </div>
    </header>

    <div class="main-container" id="app-content" style="display:none">
        <div class="sidebar">
            <h3>💬 Chat da Torcida</h3>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Comente a partida..." onkeypress="if(event.key=='Enter') sendChat()">
            
            <h3 style="margin-top: 30px;">🏆 Tabela de Classificação</h3>
            <div id="ranking-list"></div>
        </div>

        <div class="content">
            
            <div id="screen-home" class="screen active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h2 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 28px;">🔥 Quizzes da Temporada</h2>
                    <button class="btn-p" style="width:auto; padding: 12px 25px;" onclick="openEngine()">+ Criar Partida (+50 ⚽)</button>
                </div>
                <div id="quiz-grid-home" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px;"></div>
            </div>

            <div id="screen-watch" class="screen">
                <div class="watch-layout">
                    <div class="watch-main-column">
                        <div class="player-frame">
                            <div id="watch-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; z-index:10; text-align:center; padding:30px;">
                                <h1 id="watch-title-overlay" style="font-size: 38px; margin-bottom: 25px;">Título</h1>
                                <button onclick="startPlaySession()" style="background:var(--correct); color:white; padding:20px 60px; border-radius:50px; font-size:24px; border:none; cursor:pointer; font-weight:bold; box-shadow: 0 6px 0px #1a5e08;">APITAR INÍCIO!</button>
                            </div>
                            <div id="game-view" class="game-view-container">
                                <h2 id="g-question-text">Pergunta?</h2>
                                <div id="g-options-grid" class="g-options-grid"></div>
                            </div>
                        </div>
                        <div class="watch-info">
                            <h2 id="watch-title-main" style="margin:0; font-size: 26px; color: var(--primary);">Título</h2>
                            <p style="color:#666; margin: 10px 0;">Edição CTAGE Copa do Mundo • Recompensa: 50 ⚽</p>
                            <hr style="border:0; border-top:1px solid #eee;">
                            <p id="watch-desc" style="line-height: 1.6; color: #444;">Marque pontos nesta partida para subir na classificação global!</p>
                        </div>
                    </div>
                    <div class="watch-side-column">
                        <h3 style="color: white; margin-top:0; text-shadow: 1px 1px 2px #000;">Próximos Jogos</h3>
                        <div id="watch-suggestions-list"></div>
                    </div>
                </div>
            </div>

            <div id="screen-engine" class="screen">
                <div class="engine-container">
                    <div style="background:white; padding:35px; border-radius:20px; box-shadow:0 15px 40px rgba(0,0,0,0.2);">
                        <h2 style="margin-top:0; color: var(--primary);">🚀 Central de Criação CTAGE</h2>
                        <input type="text" id="eng-title" placeholder="Título da Partida" style="font-size: 20px; font-weight: bold; border: 2px solid var(--primary);">
                        <div id="eng-slides-list" style="margin-top: 25px;"></div>
                        <button onclick="addNewSlide()" style="background:#f0f0f0; color:#444; width:100%; margin-top:10px; border: 2px dashed #008751;">+ Adicionar Novo Lance</button>
                        <div style="display:flex; gap:15px; margin-top:30px;">
                            <button class="btn-p" style="flex:2; font-size: 18px; background: var(--correct);" onclick="publishQuizToCloud()">Publicar Partida</button>
                            <button onclick="showScreen('screen-home')" style="flex:1; background:#eee;">Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, increment, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtYYWq2gBk13I2AMoMvNwaiOfKab1gziM",
            authDomain: "gameedu-315ac.firebaseapp.com",
            projectId: "gameedu-315ac",
            databaseURL: "https://gameedu-315ac-default-rtdb.firebaseio.com",
            storageBucket: "gameedu-315ac.firebasestorage.app",
            messagingSenderId: "462893204799",
            appId: "1:462893204799:web:720bb0ae89a0905f3f3f8a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null;
        let library = {};
        let activeQuiz = null;

        // --- AUTH ---
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value.trim();
            const p = document.getElementById('auth-password').value;
            if(!e || p.length < 6) return alert("E-mail e senha (mín. 6) obrigatórios!");
            signInWithEmailAndPassword(auth, e, p).catch(() => {
                createUserWithEmailAndPassword(auth, e, p).then(r => set(ref(db, 'users/'+r.user.uid), {username: e.split('@')[0], coins: 100}));
            });
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; startUniverse(); }
            else { document.getElementById('screen-auth').style.display = 'flex'; document.getElementById('main-header').style.display='none'; document.getElementById('app-content').style.display='none'; }
        });

        window.logout = () => signOut(auth);

        function startUniverse() {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('app-content').style.display = 'flex';

            onValue(ref(db, 'users/' + user.uid), s => {
                if(s.val()) { document.getElementById('user-coins').innerText = s.val().coins; document.getElementById('display-username').innerText = s.val().username; }
            });

            onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(10)), s => {
                const list = document.getElementById('ranking-list'); list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((u, i) => list.innerHTML += `<div class="ranking-item"><span><b>${i+1}º</b> ${u.username}</span><span style="color:var(--primary)">⚽ ${u.coins}</span></div>`);
            });

            onValue(ref(db, 'library'), s => { library = s.val() || {}; renderHomeFeed(); });

            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                if(s.val()) Object.values(s.val()).slice(-15).forEach(m => box.innerHTML += `<div style="margin-bottom:8px;"><b>${m.user}:</b> ${m.text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, 'chat'), { user: document.getElementById('display-username').innerText, text: i.value });
            i.value = "";
        };

        function renderHomeFeed() {
            const grid = document.getElementById('quiz-grid-home'); grid.innerHTML = "";
            Object.keys(library).forEach(id => {
                const card = document.createElement('div');
                card.style = "background:white; border-radius:15px; overflow:hidden; cursor:pointer; box-shadow:0 8px 20px rgba(0,0,0,0.2); border-bottom:5px solid var(--accent);";
                card.innerHTML = `<div class="s-thumb">⚽</div><div style="padding:15px;"><b>${library[id].title}</b><br><small style="color:#666">${library[id].questions.length} Lances</small></div>`;
                card.onclick = () => goToWatchPage(id);
                grid.appendChild(card);
            });
        }

        // --- ENGINE ---
        window.openEngine = () => { document.getElementById('eng-slides-list').innerHTML = ""; showScreen('screen-engine'); };
        window.addNewSlide = () => {
            const idx = document.querySelectorAll('.engine-slide').length;
            const div = document.createElement('div'); div.className = 'engine-slide'; div.dataset.correct = "0";
            div.innerHTML = `<h4>Lance ${idx+1}</h4><input type="text" class="q-in" placeholder="Enunciado do lance...">
                <div class="opt-grid-engine">${[0,1,2,3].map(o => `
                    <div class="opt-input-wrapper"><input type="text" class="o-in" placeholder="Alternativa ${o+1}">
                    <button class="correct-btn ${o==0?'is-correct':''}" onclick="window.markC(this, ${o})">✓</button></div>`).join('')}
                </div>`;
            document.getElementById('eng-slides-list').appendChild(div);
        };
        window.markC = (btn, val) => {
            const p = btn.closest('.engine-slide'); p.dataset.correct = val;
            p.querySelectorAll('.correct-btn').forEach(b => b.classList.remove('is-correct')); btn.classList.add('is-correct');
        };
        window.publishQuizToCloud = async () => {
            const title = document.getElementById('eng-title').value;
            const questions = Array.from(document.querySelectorAll('.engine-slide')).map(s => ({
                q: s.querySelector('.q-in').value,
                options: Array.from(s.querySelectorAll('.o-in')).map(i => i.value),
                correct: s.dataset.correct
            }));
            if(!title || questions.length === 0) return alert("Erro nos dados!");
            await push(ref(db, 'library'), { title, questions });
            update(ref(db, 'users/'+user.uid), { coins: increment(50) });
            showScreen('screen-home');
        };

        // --- PLAYER ---
        window.goToWatchPage = (id) => {
            activeQuiz = library[id];
            showScreen('screen-watch');
            document.getElementById('watch-title-main').innerText = activeQuiz.title;
            document.getElementById('watch-title-overlay').innerText = activeQuiz.title;
            document.getElementById('watch-overlay').style.display = 'flex';
            document.getElementById('game-view').style.display = 'none';

            const side = document.getElementById('watch-suggestions-list'); side.innerHTML = "";
            Object.keys(library).filter(k => k !== id).slice(0, 5).forEach(k => {
                const item = document.createElement('div'); item.className = 'suggestion-card';
                item.innerHTML = `<div class="s-thumb" style="width:80px; height:50px; font-size:12px;">⚽</div><div><b>${library[k].title}</b></div>`;
                item.onclick = () => goToWatchPage(k); side.appendChild(item);
            });
        };

        window.startPlaySession = () => {
            document.getElementById('watch-overlay').style.display = 'none';
            const gameView = document.getElementById('game-view');
            gameView.style.display = 'flex';
            let step = 0;
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];

            const render = () => {
                const q = activeQuiz.questions[step];
                if(!q) { alert("GOL! Você venceu e ganhou 50 ⚽!"); update(ref(db, 'users/'+user.uid), { coins: increment(50) }); showScreen('screen-home'); return; }
                
                document.getElementById('g-question-text').innerText = q.q;
                const grid = document.getElementById('g-options-grid'); grid.innerHTML = "";
                
                q.options.forEach((opt, i) => {
                    const b = document.createElement('button'); b.className = 'btn-game-opt';
                    b.style.background = colors[i]; b.innerText = opt;
                    b.onclick = () => { step++; render(); }; grid.appendChild(b);
                });
            };
            render();
        };

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        window.searchQuizzes = () => {
            const term = document.getElementById('search-input').value.toLowerCase();
            document.querySelectorAll('#quiz-grid-home > div').forEach(card => {
                card.style.display = card.innerText.toLowerCase().includes(term) ? "block" : "none";
            });
        };
    </script>
</body>
</html>
