<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameEdu Universe - Ultimate Edition v8.3</title>
    <style id="ctage-theme">
        :root {
            --primary: #008751; --secondary: #005a36; --correct: #26890c; --accent: #ffcc00; --bg: #004d30; --white: #ffffff;
        }
        body { background-color: var(--bg); font-family: 'Segoe UI', Arial, sans-serif; margin: 0; color: #333; display: flex; flex-direction: column; height: 100vh; overflow: hidden; transition: 0.5s; }
    </style>
    <style>
        /* DESIGN GLOBAL DE INPUTS */
        input[type="email"], input[type="password"], input[type="text"] {
            width: 100%; padding: 14px 18px; margin: 10px 0; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 135, 81, 0.2); }

        /* TELA DE LOGIN (DESIGN SPLIT) */
        #screen-auth { 
            position: fixed; inset: 0; 
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://t3.ftcdn.net/jpg/04/93/55/02/360_F_493550205_qnipuTXGIDtGUo7eaX076cAdicSIETX0.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .auth-wrapper { display: flex; align-items: center; justify-content: center; width: 100%; max-width: 1200px; gap: 80px; padding: 20px; }
        .login-box { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); width: 400px; text-align: center; border: 4px solid var(--accent); }
        .logo-giant { font-size: 110px; color: var(--accent); font-weight: bold; text-shadow: 4px 4px 0 var(--primary), 8px 8px 20px rgba(0,0,0,0.8); line-height: 0.9; text-align: right; }

        /* HEADER */
        header { background: white; padding: 10px 20px; display: none; align-items: center; justify-content: space-between; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 1000; height: 65px; box-sizing: border-box; }
        .logo-home { color: var(--primary); font-weight: bold; font-size: 24px; cursor: pointer; text-decoration: none; }
        .user-stats { display: flex; gap: 15px; align-items: center; font-weight: bold; }
        .coin-display { color: #fff; background: linear-gradient(45deg, #ffd700, #ffa600); padding: 6px 15px; border-radius: 20px; box-shadow: 0 3px 0px #c58600; }

        /* LAYOUT APP */
        .main-container { display: none; flex: 1; overflow: hidden; }
        .sidebar { width: 320px; background: rgba(255,255,255,0.95); border-right: 3px solid var(--accent); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; }
        .content { flex: 1; overflow-y: auto; padding: 25px; box-sizing: border-box; position: relative; }
        .screen { display: none; width: 100%; flex-direction: column; }
        .active { display: flex; }

        /* ENGINE PROFISSIONAL ANTI-BUG */
        .engine-slide { background: white; padding: 20px; border-radius: 15px; border: 2px solid var(--primary); margin-bottom: 20px; box-shadow: 0 5px 10px rgba(0,0,0,0.1); }
        .opt-row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
        .correct-btn { width: 45px; height: 42px; background: #eee; border: 1px solid #ccc; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .is-correct { background: var(--correct) !important; color: white; border-color: var(--correct) !important; }

        /* PLAYER */
        .player-frame { background: #000; border-radius: 20px; aspect-ratio: 16/9; position: relative; overflow: hidden; border: 4px solid var(--accent); display: flex; align-items: center; justify-content: center; }
        .game-view { width: 100%; height: 100%; background: white; display: none; flex-direction: column; align-items: center; padding: 30px; box-sizing: border-box; }
        .g-options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; margin-top: 20px; }

        /* UI */
        .btn-p { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; transition: 0.2s; }
        #chat-box { flex: 1; background: #f8f9fa; border-radius: 12px; padding: 10px; overflow-y: auto; font-size: 13px; border: 1px solid #ddd; margin-bottom: 10px; }
        .quiz-card { background: white; border-radius: 15px; overflow: hidden; cursor: pointer; border-bottom: 5px solid #ddd; text-align: center; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
        .loja-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; margin-top: 15px; }
        .loja-item { background: #f9f9f9; padding: 10px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid #eee; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active">
        <div class="auth-wrapper">
            <div class="login-box">
                <h1 style="color: var(--primary); font-size: 28px; margin-bottom: 5px;">Acessar Campo</h1>
                <p style="font-weight: bold; color: #666; margin-bottom: 25px;">CTAGE Copa 2026</p>
                <input type="email" id="auth-email" placeholder="E-mail Acadêmico">
                <input type="password" id="auth-password" placeholder="Senha Mestra">
                <button class="btn-p" onclick="handleAuth()">ENTRAR E JOGAR</button>
                <div id="auth-error" style="color: red; margin-top: 10px; font-size: 13px;"></div>
            </div>
            <div class="logo-giant">Game<br>Edu</div>
        </div>
    </div>

    <header id="main-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <a href="#" class="logo-home" onclick="location.reload()">GameEdu ⚽</a>
        </div>
        <div class="user-stats">
            <button onclick="showScreen('screen-avatar')" style="background:#eee; border:none; border-radius:50%; font-size:18px; padding:10px; cursor:pointer;">👕</button>
            <span class="coin-display">⚽ <span id="user-coins">0</span></span>
            <span id="display-username" style="color: var(--primary)">...</span>
            <button onclick="logout()" style="background:#f0f0f0; border:none; padding: 8px 12px; border-radius: 8px; cursor:pointer;">Sair</button>
        </div>
    </header>

    <div class="main-container" id="app-content">
        <div class="sidebar">
            <h3>💬 Chat Global</h3>
            <div id="chat-box"></div>
            <input type="text" id="chat-input" placeholder="Comente..." onkeypress="if(event.key=='Enter') sendChat()">
            <h3 style="margin-top: 20px;">🏆 Ranking 2026</h3>
            <div id="ranking-list"></div>
        </div>

        <div class="content">
            <div id="screen-home" class="screen active">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h2 style="color: white; text-shadow: 2px 2px 4px #000;">Quizzes Recomendados</h2>
                    <button class="btn-p" style="width:auto" onclick="openEngine()">+ Criar Novo Quiz</button>
                </div>
                <div id="quiz-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px;"></div>
            </div>

            <div id="screen-watch" class="screen">
                <div style="display:grid; grid-template-columns: 1fr 320px; gap:20px;">
                    <div>
                        <div class="player-frame">
                            <div id="watch-overlay" style="position:absolute; inset:0; background:rgba(0,0,0,0.8); display:flex; flex-direction:column; align-items:center; justify-content:center; color:white; z-index:10; text-align:center;">
                                <h1 id="watch-title-overlay">Título</h1>
                                <button onclick="startPlaySession()" style="background:var(--correct); color:white; padding:15px 40px; border-radius:50px; border:none; font-size:20px; cursor:pointer;">APITAR INÍCIO!</button>
                            </div>
                            <div id="game-view" class="game-view">
                                <h2 id="g-question-text" style="color:#222; text-align:center;"></h2>
                                <div id="g-options-grid" class="g-options-grid"></div>
                            </div>
                        </div>
                        <h2 id="w-title-sub" style="color:white; margin-top:15px;">...</h2>
                    </div>
                    <div id="watch-suggestions"></div>
                </div>
            </div>

            <div id="screen-engine" class="screen">
                <div style="background:white; padding:30px; border-radius:20px; max-width:750px; margin:auto">
                    <h2 style="color:var(--primary)">🚀 Criador de Quizzes</h2>
                    <input type="text" id="eng-title-input" placeholder="Título do Quiz">
                    <div id="eng-slides-list"></div>
                    <button onclick="addNewSlide()" style="background:#eee; width:100%; margin-top:10px; border:none; padding:12px; border-radius:10px; cursor:pointer;">+ Adicionar Pergunta</button>
                    <button class="btn-p" style="margin-top:20px; background:var(--correct);" onclick="publishQuizToCloud()">Publicar Quiz (+50 ⚽)</button>
                    <button onclick="showScreen('screen-home')" style="width:100%; background:none; color:gray; margin-top:10px; border:none; cursor:pointer;">Cancelar</button>
                </div>
            </div>

            <div id="screen-avatar" class="screen">
                <div style="background:white; padding:30px; border-radius:20px; max-width:500px; margin:auto;">
                    <h2>👕 Loja do Torcedor</h2>
                    <p>Visual atual: <span id="display-avatar" style="font-size: 30px;">👤</span></p>
                    <div class="loja-grid">
                        <div class="loja-item" onclick="buyAvatar('👤', 0)">👤<br>Free</div>
                        <div class="loja-item" onclick="buyAvatar('👕', 100)">👕<br>100⚽</div>
                        <div class="loja-item" onclick="buyAvatar('👔', 200)">👔<br>200⚽</div>
                        <div class="loja-item" onclick="buyAvatar('👗', 150)">👗<br>150⚽</div>
                        <div class="loja-item" onclick="buyAvatar('🎓', 300)">🎓<br>300⚽</div>
                        <div class="loja-item" onclick="buyAvatar('👑', 500)">👑<br>500⚽</div>
                    </div>
                    <button class="btn-p" style="margin-top:20px;" onclick="showScreen('screen-home')">Voltar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-auth.js";
        import { getDatabase, ref, set, push, onValue, update, increment, query, orderByChild, limitToLast } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCtYYWq2gBk13I2AMoMvNwaiOfKab1gziM",
            authDomain: "gameedu-315ac.firebaseapp.com",
            projectId: "gameedu-315ac",
            databaseURL: "https://gameedu-315ac-default-rtdb.firebaseio.com",
            storageBucket: "gameedu-315ac.firebasestorage.app",
            messagingSenderId: "462893204799",
            appId: "1:462893204799:web:720bb0ae89a0905f3f3f8a"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let user = null; let userData = null; let library = {}; let activeQuiz = null;

        // AUTH
        window.handleAuth = () => {
            const e = document.getElementById('auth-email').value; const p = document.getElementById('auth-password').value;
            if(!e || p.length < 6) return alert("E-mail e senha de 6 dígitos são necessários!");
            signInWithEmailAndPassword(auth, e, p).catch(() => {
                createUserWithEmailAndPassword(auth, e, p).then(r => set(ref(db, 'users/'+r.user.uid), {
                    username: e.split('@')[0], coins: 100, avatar: '👤'
                }));
            });
        };

        onAuthStateChanged(auth, u => {
            if(u) { user = u; startApp(); }
            else { document.getElementById('screen-auth').style.display='flex'; document.getElementById('main-header').style.display='none'; document.getElementById('app-content').style.display='none'; }
        });

        window.logout = () => signOut(auth);

        function startApp() {
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('app-content').style.display = 'flex';

            onValue(ref(db, 'users/' + user.uid), s => {
                userData = s.val();
                if(userData) {
                    document.getElementById('user-coins').innerText = userData.coins;
                    document.getElementById('display-username').innerText = userData.username;
                    document.getElementById('display-avatar').innerText = userData.avatar || '👤';
                }
            });

            onValue(query(ref(db, 'users'), orderByChild('coins'), limitToLast(5)), s => {
                const list = document.getElementById('ranking-list'); list.innerHTML = "";
                let arr = []; s.forEach(c => arr.push(c.val()));
                arr.reverse().forEach((u, i) => list.innerHTML += `<div class="ranking-item"><span><b>${i+1}º</b> ${u.username}</span><span>⚽ ${u.coins}</span></div>`);
            });

            onValue(ref(db, 'library'), s => { library = s.val() || {}; renderFeed(); });
            
            onValue(ref(db, 'chat'), s => {
                const box = document.getElementById('chat-box'); box.innerHTML = "";
                if(s.val()) Object.values(s.val()).slice(-10).forEach(m => box.innerHTML += `<div>${m.avatar || '👤'} <b>${m.user}:</b> ${m.text}</div>`);
                box.scrollTop = box.scrollHeight;
            });
        }

        window.sendChat = () => {
            const i = document.getElementById('chat-input');
            if(i.value) push(ref(db, 'chat'), { user: userData.username, text: i.value, avatar: userData.avatar || '👤' });
            i.value = "";
        };

        function renderFeed() {
            const grid = document.getElementById('quiz-list'); grid.innerHTML = "";
            Object.keys(library).forEach(id => {
                const card = document.createElement('div'); card.className = "quiz-card";
                card.innerHTML = `<div style="height:100px; background:var(--primary); font-size:40px; display:flex; align-items:center; justify-content:center; color:white;">⚽</div><div style="padding:10px;"><b>${library[id].title}</b></div>`;
                card.onclick = () => goToWatch(id); grid.appendChild(card);
            });
        }

        // --- ENGINE COM FIX DEFINITIVO (VARREDURA DE DOM) ---
        window.openEngine = () => { document.getElementById('eng-slides-list').innerHTML = ""; showScreen('screen-engine'); addNewSlide(); };
        
        window.addNewSlide = () => {
            const idx = document.querySelectorAll('.engine-slide').length;
            const div = document.createElement('div');
            div.className = 'engine-slide';
            div.dataset.correct = "0";
            div.innerHTML = `
                <b>Pergunta ${idx+1}</b>
                <input type="text" class="q-val" placeholder="Escreva o enunciado aqui...">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
                    ${[0,1,2,3].map(o => `
                        <div class="opt-row">
                            <input type="text" class="o-val" placeholder="Opção ${o+1}">
                            <button class="correct-btn ${o==0?'is-correct':''}" onclick="window.setCorrect(this, ${o})">✓</button>
                        </div>
                    `).join('')}
                </div>`;
            document.getElementById('eng-slides-list').appendChild(div);
        };

        window.setCorrect = (btn, val) => {
            const p = btn.closest('.engine-slide');
            p.dataset.correct = val;
            p.querySelectorAll('.correct-btn').forEach(b => b.classList.remove('is-correct'));
            btn.classList.add('is-correct');
        };

        window.publishQuizToCloud = async () => {
            const title = document.getElementById('eng-title-input').value;
            const slideElements = document.querySelectorAll('.engine-slide');
            const questions = [];

            slideElements.forEach(slide => {
                const qText = slide.querySelector('.q-val').value;
                const oInputs = slide.querySelectorAll('.o-val');
                const options = Array.from(oInputs).map(inp => inp.value);
                const correct = slide.dataset.correct;

                if(qText && options.every(opt => opt !== "")) {
                    questions.push({ q: qText, options: options, correct: correct });
                }
            });

            if(!title || questions.length === 0) return alert("Preencha o título e todas as opções de pelo menos uma pergunta!");
            
            await push(ref(db, 'library'), { title, questions });
            update(ref(db, 'users/'+user.uid), { coins: increment(50) });
            showScreen('screen-home');
            alert("Quiz publicado! +50 Moedas.");
        };

        // WATCH & PLAY
        window.goToWatch = (id) => {
            activeQuiz = library[id]; showScreen('screen-watch');
            document.getElementById('watch-title-overlay').innerText = activeQuiz.title;
            document.getElementById('w-title-sub').innerText = activeQuiz.title;
            document.getElementById('watch-overlay').style.display='flex'; document.getElementById('game-view').style.display='none';
        };

        window.startPlaySession = () => {
            document.getElementById('watch-overlay').style.display='none'; document.getElementById('game-view').style.display='flex';
            let step = 0;
            const colors = ['#e21b3c', '#1368ce', '#d89e00', '#26890c'];
            const render = () => {
                const q = activeQuiz.questions[step];
                if(!q) { alert("Parabéns!"); update(ref(db, 'users/'+user.uid), {coins: increment(50)}); showScreen('screen-home'); return; }
                document.getElementById('g-question-text').innerText = q.q;
                const grid = document.getElementById('g-options-grid'); grid.innerHTML = "";
                q.options.forEach((opt, i) => {
                    const b = document.createElement('button'); b.className="btn-p"; b.style.background=colors[i]; b.innerText=opt;
                    b.onclick = () => {step++; render();}; grid.appendChild(b);
                });
            };
            render();
        };

        window.buyAvatar = (emoji, cost) => {
            if(userData.coins >= cost) {
                update(ref(db, 'users/' + user.uid), { avatar: emoji, coins: increment(-cost) });
                alert("Visual atualizado!");
            } else { alert("Moedas insuficientes!"); }
        };

        window.showScreen = (id) => {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
